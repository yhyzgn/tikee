<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" role="img" aria-labelledby="title desc">
  <title id="title">Tikeo orbital control-plane logo</title>
  <desc id="desc">Animated SVG mark with a breathing control core and orbiting worker nodes.</desc>
  <defs>
    <radialGradient id="core" cx="48%" cy="42%" r="62%"><stop offset="0%" stop-color="#ffffff"/><stop offset="42%" stop-color="var(--core-mid)"/><stop offset="100%" stop-color="var(--core-edge)"/></radialGradient>
    <linearGradient id="orbit" x1="24" y1="42" x2="138" y2="118" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="var(--primary)"/><stop offset="55%" stop-color="var(--secondary)"/><stop offset="100%" stop-color="var(--tertiary)"/></linearGradient>
    <filter id="softGlow" x="-35%" y="-35%" width="170%" height="170%"><feGaussianBlur stdDeviation="3.4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <style>
    :root { --primary: #2563eb; --secondary: #7c3aed; --tertiary: #0891b2; --core-mid: #60a5fa; --core-edge: #2563eb; --axis: rgba(15,23,42,.38); --orbit-opacity: .35; --ring-opacity: .13; }
    @media (prefers-color-scheme: dark) { :root { --primary: #7dd3fc; --secondary: #a78bfa; --tertiary: #34d399; --core-mid: #7dd3fc; --core-edge: #2563eb; --axis: rgba(226,232,240,.58); --orbit-opacity: .44; --ring-opacity: .2; } }
    .orbit { fill: none; stroke: url(#orbit); stroke-width: 2.4; stroke-linecap: round; opacity: var(--orbit-opacity); }
    .ring { fill: none; stroke: var(--primary); stroke-width: 1.4; opacity: var(--ring-opacity); transform-origin: 80px 80px; animation: breathe 3.8s ease-in-out infinite; }
    .core { fill: url(#core); stroke: rgba(224,242,254,.86); stroke-width: 2.2; filter: url(#softGlow); transform-origin: 80px 80px; animation: corePulse 3.8s ease-in-out infinite; }
    .nodeTrackA { transform-origin: 80px 80px; animation: orbitA 8.5s linear infinite; }
    .nodeTrackB { transform-origin: 80px 80px; animation: orbitB 13s linear infinite; }
    .node { fill: var(--primary); filter: url(#softGlow); }.node2 { fill: var(--secondary); filter: url(#softGlow); }.axis { stroke: var(--axis); stroke-width: 1.2; stroke-linecap: round; }
    @keyframes corePulse { 0%,100% { transform: scale(.96); } 50% { transform: scale(1.045); } }
    @keyframes breathe { 0%,100% { transform: scale(.94); opacity: calc(var(--ring-opacity) * .66); } 50% { transform: scale(1.05); opacity: calc(var(--ring-opacity) * 1.2); } }
    @keyframes orbitA { to { transform: rotate(360deg); } } @keyframes orbitB { to { transform: rotate(-360deg); } }
    @media (prefers-reduced-motion: reduce) { .ring,.core,.nodeTrackA,.nodeTrackB { animation: none; } }
  </style>
  <circle class="ring" cx="80" cy="80" r="42"/><ellipse class="orbit" cx="80" cy="80" rx="58" ry="31" transform="rotate(-22 80 80)"/><ellipse class="orbit" cx="80" cy="80" rx="48" ry="25" transform="rotate(34 80 80)" opacity=".82"/><circle class="core" cx="80" cy="80" r="17"/><g class="nodeTrackA"><g transform="rotate(-22 80 80) translate(138 80)"><circle class="node" r="7"/><path class="axis" d="M-4 0h8M0-4v8"/></g></g><g class="nodeTrackB"><g transform="rotate(34 80 80) translate(128 80)"><circle class="node2" r="5.6"/><path class="axis" d="M-3.2 0h6.4"/></g></g>
</svg>
