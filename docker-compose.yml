services:
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    image: scheduler:dev
    command: ["serve", "--config", "/app/config/container.toml"]
    ports:
      - "9090:9090"
      - "9998:9998"
    volumes:
      - scheduler-data:/data
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: scheduler-web:dev
    depends_on:
      - scheduler
    ports:
      - "8080:80"

volumes:
  scheduler-data:
