apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tikeemanifests.tikee.io
spec:
  group: tikee.io
  scope: Namespaced
  names:
    plural: tikeemanifests
    singular: tikeemanifest
    kind: TikeeManifest
    shortNames: [tkm]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [manifest]
              properties:
                manifest:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                applyMode:
                  type: string
                  enum: [diffOnly, apply]
                  default: diffOnly
