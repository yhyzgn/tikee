<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" role="img" aria-labelledby="title desc">
  <title id="title">Tikeo orbital control-plane logo</title>
  <desc id="desc">Animated SVG mark with a breathing control core and orbiting worker nodes.</desc>
  <defs>
    <radialGradient id="core" cx="48%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="42%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </radialGradient>
    <linearGradient id="orbit" x1="24" y1="42" x2="138" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="55%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    :root { --orbit-opacity: .34; --ring-opacity: .18; --node: #2563eb; --node-2: #7c3aed; --core-stroke: #dbeafe; }
    .orbit { fill: none; stroke: url(#orbit); stroke-width: 2.4; stroke-linecap: round; opacity: var(--orbit-opacity); }
    .ring { fill: none; stroke: #2563eb; stroke-width: 1.4; opacity: var(--ring-opacity); transform-origin: 80px 80px; animation: breathe 3.8s ease-in-out infinite; }
    .core { fill: url(#core); stroke: var(--core-stroke); stroke-width: 2.2; filter: url(#softGlow); transform-origin: 80px 80px; animation: corePulse 3.8s ease-in-out infinite; }
    .nodeTrackA { transform-origin: 80px 80px; animation: orbitA 8.5s linear infinite; }
    .nodeTrackB { transform-origin: 80px 80px; animation: orbitB 13s linear infinite; }
    .node { fill: var(--node); filter: url(#softGlow); }
    .node2 { fill: var(--node-2); filter: url(#softGlow); }
    .axis { stroke: rgba(15, 23, 42, .38); stroke-width: 1.2; stroke-linecap: round; }
    @keyframes corePulse { 0%,100% { transform: scale(.96); } 50% { transform: scale(1.045); } }
    @keyframes breathe { 0%,100% { transform: scale(.94); opacity: .11; } 50% { transform: scale(1.05); opacity: .22; } }
    @keyframes orbitA { to { transform: rotate(360deg); } }
    @keyframes orbitB { to { transform: rotate(-360deg); } }
    @media (prefers-reduced-motion: reduce) { .ring,.core,.nodeTrackA,.nodeTrackB { animation: none; } }
  </style>
  <circle class="ring" cx="80" cy="80" r="42"/>
  <ellipse class="orbit" cx="80" cy="80" rx="58" ry="31" transform="rotate(-22 80 80)"/>
  <ellipse class="orbit" cx="80" cy="80" rx="48" ry="25" transform="rotate(34 80 80)" opacity=".78"/>
  <circle class="core" cx="80" cy="80" r="17"/>
  <g class="nodeTrackA"><g transform="rotate(-22 80 80) translate(138 80)"><circle class="node" r="7"/><path class="axis" d="M-4 0h8M0-4v8"/></g></g>
  <g class="nodeTrackB"><g transform="rotate(34 80 80) translate(128 80)"><circle class="node2" r="5.6"/><path class="axis" d="M-3.2 0h6.4"/></g></g>
</svg>
